<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Student Grade Viewer</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background:#eef2f7; margin:0; }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 12px;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h2, h3, h4 { text-align:center; margin:10px 0; }

    input, button {
      width:100%;
      padding:14px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
    }

    button {
      background:#4CAF50;
      color:white;
      border:none;
      font-weight:bold;
    }

    button:active {
      transform: scale(0.98);
    }

    table {
      width:100%;
      margin-top:10px;
      border-collapse: collapse;
      font-size:14px;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
      word-break: break-word;
    }

    .hidden { display:none; }

    /* Mobile improvements */
    @media (max-width: 480px) {
      .container { padding:8px; }
      input, button { font-size:14px; padding:12px; }
      table { font-size:13px; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="card">
    <h2>Login</h2>
    <input type="text" id="loginID" placeholder="Student ID or Admin Email">
    <input type="password" id="password" placeholder="Password">
    <button type="button" onclick="login()">Login</button>
  </div>

  <div id="studentView" class="card hidden"></div>

  <div id="adminPanel" class="card hidden">
    <h2>Admin Dashboard</h2>

    <h3>Add Student</h3>
    <input id="newID" placeholder="Student ID">
    <input id="newPassword" placeholder="Password (min 6 chars)">
    <input id="newName" placeholder="Name">
    <button type="button" onclick="addStudent()">Add Student</button>

    <h3>Search Student</h3>
    <input id="searchID" placeholder="Enter Student ID" oninput="searchStudent()">
    <div id="searchResult"></div>
  </div>

</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDj53pOO8PuCtjsjcMFFcj6fQG_TItfhZ0",
    authDomain: "testing-grade-2026.firebaseapp.com",
    projectId: "testing-grade-2026",
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const ADMIN_EMAIL = "sphencerpaclibare.edu@gmail.com";

  async function login() {
    const loginID = document.getElementById("loginID").value.trim();
    const password = document.getElementById("password").value;

    if (loginID === ADMIN_EMAIL) {
      auth.signInWithEmailAndPassword(ADMIN_EMAIL, password)
        .then(() => showAdmin())
        .catch(err => alert(err.message));
    } else {
      const doc = await db.collection("students").doc(loginID).get();
      if (!doc.exists) { alert('Student ID not found'); return; }
      const data = doc.data();
      if (data.password !== password) { alert('Incorrect password'); return; }
      showStudent(loginID);
    }
  }

  function showStudent(uid) {
    document.getElementById("studentView").classList.remove("hidden");
    document.getElementById("adminPanel").classList.add("hidden");

    db.collection("students").doc(uid).get().then(doc => {
      const data = doc.data();
      let html = `<h3>${data.name}</h3><table><tr><th>Subject</th><th>Grade</th></tr>`;
      for (let sub in data.subjects) {
        html += `<tr><td>${sub}</td><td>${data.subjects[sub]}</td></tr>`;
      }
      html += `</table>`;
      document.getElementById("studentView").innerHTML = html;
    }).catch(err => alert('Error: ' + err.message));
  }

  function showAdmin() {
    document.getElementById("adminPanel").classList.remove("hidden");
    document.getElementById("studentView").classList.add("hidden");
  }

  async function addStudent() {
    const studentID = document.getElementById("newID").value.trim();
    const password = document.getElementById("newPassword").value;
    const name = document.getElementById("newName").value.trim();

    if (!studentID || !password || !name) { alert("Please fill in all fields."); return; }
    if (password.length < 6) { alert("Password must be at least 6 characters."); return; }

    const docRef = db.collection("students").doc(studentID);
    const doc = await docRef.get();
    if (doc.exists) { alert('This student ID already exists.'); return; }

    try {
      await docRef.set({ name, password, subjects: {} });
      alert('Student added successfully');
      document.getElementById("newID").value = '';
      document.getElementById("newPassword").value = '';
      document.getElementById("newName").value = '';
    } catch(err) {
      alert('Error adding student: ' + err.message);
    }
  }

  function searchStudent() {
    const searchID = document.getElementById("searchID").value.trim();
    const resultDiv = document.getElementById("searchResult");
    resultDiv.innerHTML = '';
    if (!searchID) return;

    db.collection("students").doc(searchID).get().then(doc => {
      if (!doc.exists) { resultDiv.innerHTML = 'Student not found'; return; }
      const data = doc.data();
      let html = `<h4>${data.name}</h4> <button onclick="deleteStudent('${searchID}')" style='background:#e74c3c;margin-bottom:10px;'>Delete Student</button>`;
      for (let sub in data.subjects) {
        html += `${sub}: <input value='${data.subjects[sub]}' id='edit_${searchID}_${sub}'>` +
                `<button onclick="updateGrade('${searchID}','${sub}')">Save</button><br>`;
      }
      html += `<br><input placeholder='Subject' id='sub_${searchID}'><input placeholder='Grade' id='grade_${searchID}'>` +
              `<button onclick="addSubject('${searchID}')">Add</button>`;
      resultDiv.innerHTML = html;
    }).catch(err => resultDiv.innerHTML = 'Error: ' + err.message);
  }

  function updateGrade(uid, sub) {
    const value = document.getElementById(`edit_${uid}_${sub}`).value;
    db.collection("students").doc(uid).update({ [`subjects.${sub}`]: value })
      .then(() => alert('Grade updated'))
      .catch(err => alert('Permission error: ' + err.message));
  }

  function addSubject(uid) {
    const sub = document.getElementById(`sub_${uid}`).value.trim();
    const grade = document.getElementById(`grade_${uid}`).value.trim();
    if (!sub || !grade) { alert('Please enter subject and grade'); return; }

    db.collection("students").doc(uid).update({ [`subjects.${sub}`]: grade })
      .then(() => searchStudent())
      .catch(err => alert('Permission error: ' + err.message));
  }

  function deleteStudent(uid) {
    if (!confirm('Are you sure you want to delete this student?')) return;

    db.collection("students").doc(uid).delete()
      .then(() => {
        alert('Student deleted');
        document.getElementById("searchResult").innerHTML = '';
        document.getElementById("searchID").value = '';
      })
      .catch(err => alert('Error deleting: ' + err.message));
  }
</script>

</body>
</html>
